var AD=0,TAB=0;
var msgs=JSON.parse(localStorage.getItem("tm")||"[]");
var cfg=JSON.parse(localStorage.getItem("tc")||'{"gps":true,"time":true}');
var wid=null,gpsOk=false,lastLK="",lastTK="",dip=null;

window.addEventListener("beforeinstallprompt",function(e){e.preventDefault();dip=e;});

function tick(){
  var n=new Date();
  document.getElementById("clk").textContent=pad(n.getHours())+":"+pad(n.getMinutes())+":"+pad(n.getSeconds());
}
function pad(x){return String(x).padStart(2,"0");}
setInterval(tick,1000);tick();

function autoDay(){
  var n=new Date();
  if(n.getFullYear()===2026&&n.getMonth()===2){var d=n.getDate();if(d>=19&&d<=23){AD=d-19;return;}}
  AD=0;
}

function curIdx(stops){
  var n=new Date(),hm=n.getHours()*60+n.getMinutes(),last=-1;
  stops.forEach(function(s,i){var p=s.tm.split(":");if(parseInt(p[0])*60+parseInt(p[1])<=hm)last=i;});
  return last;
}

function showBanner(title,body){
  document.getElementById("abt").textContent=title;
  document.getElementById("abb").textContent=body;
  document.getElementById("ab").classList.add("show");
  addMsg(title+": "+body,"#f87171");
  doNotif(title,body);
}
function closeAB(){document.getElementById("ab").classList.remove("show");}

function doNotif(t,b){
  if(window.Notification&&Notification.permission==="granted"){
    try{new Notification(t,{body:b});}catch(e){}
  }
}

function addMsg(txt,col){
  var n=new Date();
  msgs.unshift({txt:txt,col:col||"#ea580c",t:pad(n.getHours())+":"+pad(n.getMinutes()),d:n.toLocaleDateString()});
  if(msgs.length>60)msgs.pop();
  localStorage.setItem("tm",JSON.stringify(msgs));
  var l=document.getElementById("bn2lbl");
  if(l)l.textContent=msgs.length>0?"Alerts ("+msgs.length+")":"Alerts";
}

function km(la1,lo1,la2,lo2){
  var R=6371,dL=(la2-la1)*Math.PI/180,dO=(lo2-lo1)*Math.PI/180;
  var a=Math.sin(dL/2)*Math.sin(dL/2)+Math.cos(la1*Math.PI/180)*Math.cos(la2*Math.PI/180)*Math.sin(dO/2)*Math.sin(dO/2);
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

function startGPS(){
  if(!navigator.geolocation)return;
  wid=navigator.geolocation.watchPosition(function(pos){
    gpsOk=true;
    var b=document.getElementById("gpsBadge");b.className="gpsbadge on";
    document.getElementById("gpsLbl").textContent="GPS "+Math.round(pos.coords.accuracy)+"m";
    checkLoc(pos.coords.latitude,pos.coords.longitude);
  },function(){
    gpsOk=false;
    var b=document.getElementById("gpsBadge");b.className="gpsbadge off";
    document.getElementById("gpsLbl").textContent="GPS off";
  },{enableHighAccuracy:true,timeout:15000,maximumAge:20000});
}
function stopGPS(){
  if(wid!=null){navigator.geolocation.clearWatch(wid);wid=null;}
  gpsOk=false;
  document.getElementById("gpsBadge").className="gpsbadge off";
  document.getElementById("gpsLbl").textContent="GPS off";
}

function checkLoc(lat,lng){
  if(!cfg.gps)return;
  var stops=D[AD].st;
  stops.forEach(function(s){
    if(!s.la)return;
    var d=km(lat,lng,s.la,s.lo),k=AD+"-"+s.nm;
    if(d<1.5&&lastLK!==k){lastLK=k;showBanner("Near: "+s.nm,s.dt.substring(0,80));}
  });
  if(km(lat,lng,11.813,76.689)<2){var k="fuel-g";if(lastLK!==k){lastLK=k;showBanner("FUEL STOP - Gundlupet!","Fill full tank NOW! No petrol in Bandipur forest!");}}
  if(km(lat,lng,11.671,76.628)<3){var k="bpf";if(lastLK!==k){lastLK=k;showBanner("Entering Bandipur Forest!","20 kmph. NO HONKING. Windows open. AC off. Stay in car!");}}
}

function checkTime(){
  if(!cfg.time)return;
  var n=new Date(),hm=n.getHours()*100+n.getMinutes();
  var stops=D[AD].st;
  stops.forEach(function(s){
    var p=s.tm.split(":"),st=parseInt(p[0])*100+parseInt(p[1]),k=AD+"-"+s.tm;
    if(hm>=st&&hm<=st+4&&lastTK!==k){lastTK=k;showBanner("Time: "+s.nm,s.dt.substring(0,80));}
  });
  if(AD===0&&hm>=400&&hm<=404&&lastTK!=="d1d"){lastTK="d1d";showBanner("Depart Coimbatore NOW!","4:30 AM - time to leave!");}
  if(AD===1&&hm>=1755&&hm<=1759&&lastTK!=="d2b"){lastTK="d2b";showBanner("Leave for Brindavan NOW!","Must enter before 6:00 PM!");}
  if(AD===0&&hm>=1625&&hm<=1629&&lastTK!=="d1r"){lastTK="d1r";showBanner("Ranganathittu!","Boats stop 5:30 PM - leave Balmuri now!");}
}

setInterval(function(){checkTime();if(TAB===0)renderToday();},30000);

async function askNotif(){
  if(!window.Notification){addMsg("Notifications not supported.","#f87171");return;}
  var p=await Notification.requestPermission();
  if(p==="granted"){
    document.getElementById("nalertbtn").textContent="Alerts ON";
    document.getElementById("nalertbtn").classList.add("on");
    addMsg("Alerts enabled! You will get notifications at key stops.","#4ade80");
  } else {
    addMsg("Permission denied. Enable in Settings > App > Notifications.","#f87171");
  }
}

  document.getElementById("main").innerHTML=h;

}
