<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#0a0f1e">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Trip 2026">
<title>Shankar Trip 2026</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.svg">
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0a0f1e;--bg2:#111827;--bg3:#1e2435;--bg4:#252d40;
  --tx:#f1f5f9;--tx2:#94a3b8;--tx3:#475569;
  --d1:#ea580c;--d2:#7c3aed;--d3:#059669;--d4:#db2777;--d5:#2563eb;
  --green:#16a34a;--amber:#d97706;--red:#dc2626;--blue:#2563eb;
}
html,body{height:100%;overflow:hidden;background:var(--bg)}
body{font-family:'Nunito',sans-serif;color:var(--tx);display:flex;flex-direction:column}
#app{display:flex;flex-direction:column;height:100%;overflow:hidden}

/* TOP BAR */
.topbar{background:var(--bg2);padding:12px 16px 10px;flex-shrink:0;
  border-bottom:1px solid rgba(255,255,255,0.06)}
.topbar-row1{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
.app-title{font-size:14px;font-weight:800;color:var(--tx)}
.clock-box{font-size:16px;font-weight:700;font-family:monospace;
  background:var(--bg3);padding:4px 10px;border-radius:8px;color:var(--tx)}
.topbar-row2{display:flex;align-items:center;gap:8px}
.gps-badge{display:flex;align-items:center;gap:4px;font-size:11px;
  padding:3px 8px;border-radius:10px;font-weight:600}
.gps-badge.on{background:rgba(22,163,74,0.15);color:#4ade80}
.gps-badge.off{background:rgba(220,38,38,0.15);color:#f87171}
.gps-dot{width:7px;height:7px;border-radius:50%}
.gps-badge.on .gps-dot{background:#4ade80;animation:pulse 2s infinite}
.gps-badge.off .gps-dot{background:#f87171}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
.notif-btn{margin-left:auto;font-size:11px;padding:3px 10px;border-radius:10px;
  background:var(--bg3);color:var(--tx2);border:none;cursor:pointer;font-family:'Nunito',sans-serif;font-weight:600}

/* DAY TABS */
.day-tabs{display:flex;gap:6px;padding:10px 16px;overflow-x:auto;
  flex-shrink:0;scrollbar-width:none;background:var(--bg2)}
.day-tabs::-webkit-scrollbar{display:none}
.day-tab{flex-shrink:0;padding:6px 14px;border-radius:20px;
  border:1.5px solid rgba(255,255,255,0.1);font-size:12px;font-weight:700;
  cursor:pointer;background:transparent;color:var(--tx2);transition:all 0.2s;
  font-family:'Nunito',sans-serif}
.day-tab.active{color:#fff;border-width:2px}

/* ALERT STRIP */
.alert-strip{background:rgba(220,38,38,0.15);border-bottom:1px solid rgba(220,38,38,0.3);
  padding:8px 16px;flex-shrink:0;display:none}
.alert-strip.show{display:flex;align-items:flex-start;gap:8px}
.alert-icon{font-size:18px;flex-shrink:0;margin-top:1px}
.alert-content{flex:1}
.alert-title{font-size:12px;font-weight:800;color:#f87171}
.alert-body{font-size:11px;color:#fca5a5;margin-top:1px;line-height:1.4}
.alert-close{background:none;border:none;color:#f87171;font-size:18px;cursor:pointer;padding:0;flex-shrink:0}

/* MAIN SCROLL */
.main{flex:1;overflow-y:auto;padding:0 0 80px}
.main::-webkit-scrollbar{display:none}

/* HERO CARD */
.hero{margin:12px;border-radius:16px;padding:16px;border:1.5px solid rgba(255,255,255,0.08);
  background:var(--bg2)}
.hero-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px}
.hero-left .day-lbl{font-size:10px;font-weight:700;text-transform:uppercase;
  letter-spacing:1px;color:var(--tx3);margin-bottom:2px}
.hero-left .day-name{font-size:18px;font-weight:900;line-height:1.2}
.hero-left .day-sub{font-size:11px;color:var(--tx2);margin-top:3px}
.km-pill{padding:6px 12px;border-radius:20px;font-size:13px;font-weight:800;color:#fff}
.prog-lbl{display:flex;justify-content:space-between;font-size:11px;
  color:var(--tx3);margin-bottom:5px}
.prog-bar{height:4px;border-radius:2px;background:var(--bg3);overflow:hidden}
.prog-fill{height:100%;border-radius:2px;transition:width 0.6s ease}

/* NOW CARD */
.now-card{margin:0 12px 10px;border-radius:12px;padding:14px 16px;border:2px solid}
.now-lbl{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px}
.now-name{font-size:16px;font-weight:800;line-height:1.3}
.now-time{font-size:11px;margin-top:2px;opacity:0.8;font-family:monospace}
.now-detail{font-size:12px;margin-top:6px;line-height:1.5;opacity:0.85}

/* MESSAGES */
.msg-section{margin:0 12px 10px}
.msg-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.msg-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.8px;color:var(--tx3)}
.msg-clear{font-size:11px;color:var(--tx3);background:none;border:none;cursor:pointer;font-family:'Nunito',sans-serif}
.msg-list{display:flex;flex-direction:column;gap:5px;max-height:180px;overflow-y:auto}
.msg-item{background:var(--bg3);border-radius:8px;padding:9px 11px;
  border-left:3px solid;font-size:12px;line-height:1.4}
.msg-item .msg-time{font-size:10px;color:var(--tx3);font-family:monospace;margin-bottom:2px}
.msg-item .msg-text{color:var(--tx)}
.msg-empty{font-size:12px;color:var(--tx3);text-align:center;padding:12px;
  background:var(--bg3);border-radius:8px}

/* STOPS */
.sec-lbl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.8px;
  color:var(--tx3);margin:14px 12px 8px}
.stop-list{margin:0 12px;display:flex;flex-direction:column}
.stop-item{display:flex;gap:10px;position:relative}
.sl{display:flex;flex-direction:column;align-items:center;width:32px;flex-shrink:0}
.sd{width:13px;height:13px;border-radius:50%;border:2.5px solid;margin-top:4px;flex-shrink:0;transition:all 0.3s}
.sline{width:2px;flex:1;min-height:20px;background:rgba(255,255,255,0.08);margin-top:2px}
.sr{flex:1;padding-bottom:14px}
.s-time{font-size:10px;color:var(--tx3);font-family:monospace;margin-bottom:1px}
.s-name{font-size:13px;font-weight:700;line-height:1.3;transition:color 0.3s}
.s-detail{font-size:11px;color:var(--tx2);margin-top:2px;line-height:1.4}
.s-tags{display:flex;gap:4px;flex-wrap:wrap;margin-top:5px}
.stag{font-size:10px;font-weight:600;padding:2px 7px;border-radius:8px}
.stag.toll{background:rgba(217,119,6,0.2);color:#fbbf24}
.stag.free{background:rgba(22,163,74,0.2);color:#4ade80}
.stag.warn{background:rgba(220,38,38,0.2);color:#f87171}
.stag.info{background:rgba(37,99,235,0.2);color:#60a5fa}
.stag.rest{background:rgba(100,116,139,0.2);color:#94a3b8}
.stop-item.done .s-name{color:var(--tx3)}
.stop-item.done .sd{opacity:0.35}
.stop-item.done .sline{opacity:0.3}
.stop-item.cur .s-name{font-size:14px;font-weight:800}

/* HOTEL */
.hotel-cards{display:flex;flex-direction:column;gap:8px;margin:0 12px 16px}
.hotel-card{background:var(--bg2);border-radius:12px;padding:14px;
  border:1.5px solid rgba(255,255,255,0.08)}
.h-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.8px;
  color:var(--tx3);margin-bottom:4px}
.h-name{font-size:14px;font-weight:800}
.h-meta{font-size:11px;color:var(--tx2);margin-top:2px}
.h-row{display:flex;gap:6px;margin-top:10px}
.h-tag{flex:1;text-align:center;background:var(--bg3);border-radius:8px;
  padding:6px;font-size:10px;font-weight:600;color:var(--tx2)}

/* ALERTS LIST */
.alert-list{margin:0 12px;display:flex;flex-direction:column;gap:6px;margin-bottom:16px}
.al-item{background:rgba(220,38,38,0.1);border:1px solid rgba(220,38,38,0.25);
  border-radius:10px;padding:10px 12px}
.al-title{font-size:12px;font-weight:800;color:#f87171;margin-bottom:2px}
.al-body{font-size:11px;color:#fca5a5;line-height:1.4}

/* BUDGET BAR */
.budget-bar{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;
  margin:0 12px 16px}
.b-item{background:var(--bg2);border-radius:10px;padding:10px;text-align:center}
.b-val{font-size:15px;font-weight:800;font-family:monospace}
.b-lbl{font-size:10px;color:var(--tx3);margin-top:2px}

/* BOTTOM NAV */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--bg2);
  border-top:1px solid rgba(255,255,255,0.08);display:flex;z-index:100}
.nav-btn{flex:1;padding:10px 4px 8px;background:none;border:none;
  display:flex;flex-direction:column;align-items:center;gap:3px;
  cursor:pointer;font-family:'Nunito',sans-serif}
.nav-icon{font-size:20px}
.nav-lbl{font-size:9px;font-weight:600;color:var(--tx3)}
.nav-btn.active .nav-lbl{color:var(--tx)}

/* INSTALL BANNER */
.install-banner{margin:10px 12px;background:linear-gradient(135deg,rgba(124,58,237,0.2),rgba(37,99,235,0.2));
  border:1px solid rgba(124,58,237,0.4);border-radius:12px;padding:12px 14px;
  display:none}
.install-banner.show{display:block}
.ib-title{font-size:13px;font-weight:800;color:#a78bfa;margin-bottom:4px}
.ib-text{font-size:11px;color:var(--tx2);margin-bottom:8px;line-height:1.4}
.ib-btn{background:#7c3aed;color:#fff;border:none;border-radius:8px;
  padding:8px 16px;font-size:12px;font-weight:700;cursor:pointer;
  font-family:'Nunito',sans-serif}

/* OVERVIEW SCREEN */
.overview{padding:12px;display:none}
.ov-card{background:var(--bg2);border-radius:14px;padding:14px;margin-bottom:10px;
  border:1.5px solid rgba(255,255,255,0.06)}
.ov-day-hdr{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.ov-num{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;
  justify-content:center;font-size:16px;font-weight:900;color:#fff;flex-shrink:0}
.ov-title{font-size:13px;font-weight:800}
.ov-sub{font-size:11px;color:var(--tx2)}
.ov-row{display:flex;justify-content:space-between;font-size:11px;
  color:var(--tx2);padding:4px 0;border-bottom:1px solid rgba(255,255,255,0.05)}
.ov-row:last-child{border-bottom:none}
.ov-row span{font-weight:700;color:var(--tx)}

/* SETTINGS SCREEN */
.settings{padding:12px;display:none}
.set-card{background:var(--bg2);border-radius:14px;padding:16px;margin-bottom:10px;
  border:1.5px solid rgba(255,255,255,0.06)}
.set-title{font-size:13px;font-weight:800;margin-bottom:12px;color:var(--tx)}
.set-row{display:flex;align-items:center;justify-content:space-between;
  padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.05)}
.set-row:last-child{border-bottom:none}
.set-lbl{font-size:13px;color:var(--tx)}
.set-sub{font-size:11px;color:var(--tx2);margin-top:1px}
.toggle{position:relative;width:44px;height:24px;flex-shrink:0}
.toggle input{opacity:0;width:0;height:0}
.slider{position:absolute;top:0;left:0;right:0;bottom:0;background:var(--bg3);
  border-radius:24px;cursor:pointer;transition:0.3s}
.slider:before{position:absolute;content:'';height:18px;width:18px;left:3px;bottom:3px;
  background:#fff;border-radius:50%;transition:0.3s}
input:checked+.slider{background:#7c3aed}
input:checked+.slider:before{transform:translateX(20px)}

.book-card{background:var(--bg2);border-radius:14px;padding:14px;margin-bottom:10px;
  border:1px solid rgba(255,255,255,0.06)}
.book-title{font-size:13px;font-weight:800;color:#a78bfa;margin-bottom:8px}
.book-row{display:flex;justify-content:space-between;font-size:11px;
  padding:4px 0;border-bottom:1px solid rgba(255,255,255,0.05)}
.book-row:last-child{border-bottom:none}
.book-row .bl{color:var(--tx2)}
.book-row .bv{font-weight:700;color:var(--tx)}

</style>
</head>

<div class="topbar">

</div>
</div>

function saveMsg(text,color){
  const now=new Date();
  const t=`${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
  messages.unshift({text,color:color||'#ea580c',time:t,date:now.toDateString()});
  if(messages.length>50)messages.pop();
  localStorage.setItem('tripMsgs',JSON.stringify(messages));
}

function showAlert(title,body){
  document.getElementById('alertTitle').textContent=title;
  document.getElementById('alertBody').textContent=body;
  document.getElementById('alertStrip').classList.add('show');
  saveMsg('⚠️ '+title+': '+body,'#f87171');
  sendPushNotif(title,body);
}
function closeAlert(){document.getElementById('alertStrip').classList.remove('show')}

async function sendPushNotif(title,body){
  if(!('Notification' in window))return;
  if(Notification.permission==='granted'){
    if(navigator.serviceWorker&&navigator.serviceWorker.controller){
      navigator.serviceWorker.ready.then(reg=>{
        reg.showNotification(title,{body,icon:'icon.svg',vibrate:[200,100,200],badge:'icon.svg'});
      });
    } else {new Notification(title,{body})}
  }
}

async function requestNotif(){
  if(!('Notification' in window)){saveMsg('Notifications not supported on this browser.','#f87171');return;}
  const perm=await Notification.requestPermission();
  if(perm==='granted'){
    notifEnabled=true;
    document.getElementById('notifBtn').textContent='Alerts ON ✓';
    document.getElementById('notifBtn').style.background='rgba(22,163,74,0.2)';
    document.getElementById('notifBtn').style.color='#4ade80';
    saveMsg('Push notifications enabled! You will get alerts at key stops.','#4ade80');
  } else {
    saveMsg('Notification permission denied. Enable in phone settings for alerts.','#f87171');
  }
}

function startGPS(){
  if(!navigator.geolocation){saveMsg('GPS not available on this device.','#f87171');return;}
  watchId=navigator.geolocation.watchPosition(pos=>{
    gpsActive=true;
    const b=document.getElementById('gpsBadge');
    b.className='gps-badge on';
    document.getElementById('gpsText').textContent=`GPS ${pos.coords.accuracy.toFixed(0)}m`;
    checkLocationAlerts(pos.coords.latitude,pos.coords.longitude);
  },err=>{
    gpsActive=false;
    const b=document.getElementById('gpsBadge');
    b.className='gps-badge off';
    document.getElementById('gpsText').textContent='GPS off';
    useTimeBasedAlerts();
  },{enableHighAccuracy:true,timeout:10000,maximumAge:30000});
}

function dist(lat1,lon1,lat2,lon2){
  const R=6371;
  const dLat=(lat2-lat1)*Math.PI/180;
  const dLon=(lon2-lon1)*Math.PI/180;
  const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

let lastLocAlert='';
function checkLocationAlerts(lat,lng){
  const today=getToday();
  if(!today)return;
  today.stops.forEach(s=>{
    if(!s.lat)return;
    const d=dist(lat,lng,s.lat,s.lng);
    const key=`${today.n}-${s.name}`;
    if(d<1.5&&lastLocAlert!==key){
      lastLocAlert=key;
      showAlert('Approaching: '+s.name, s.detail.substring(0,80));
    }
  });
  today.alerts.forEach(a=>{
    if(a.b.includes('Gundlupet')&&dist(lat,lng,11.8130,76.6892)<2){
      const k='fuel-gundlupet';
      if(lastLocAlert!==k){lastLocAlert=k;showAlert(a.t,a.b);}
    }
    if(a.b.includes('Bandipur')&&dist(lat,lng,11.6710,76.6283)<3){
      const k='bandipur-rules';
      if(lastLocAlert!==k){lastLocAlert=k;showAlert(a.t,a.b);}
    }
  });
}

function getToday(){
  const now=new Date();
  if(now.getFullYear()===2026&&now.getMonth()===2){
    const d=now.getDate();
    if(d>=19&&d<=23)return DAYS[d-19];
  }
  return DAYS[activeDay];
}

let lastTimeAlert='';
function useTimeBasedAlerts(){
  const now=new Date();
  const hm=now.getHours()*100+now.getMinutes();
  const today=getToday();
  if(!today)return;
  today.stops.forEach(s=>{
    const [h,m]=s.time.split(':').map(Number);
    const st=h*100+m;
    const key=`${today.n}-${st}`;
    if(hm>=st&&hm<=st+5&&lastTimeAlert!==key){
      lastTimeAlert=key;
      showAlert('Time: '+s.name, s.detail.substring(0,80));
    }
  });
  today.alerts.forEach(a=>{
    if(a.b.includes('4:30 AM')&&hm>=400&&hm<=410&&lastTimeAlert!=='depart'){
      lastTimeAlert='depart'; showAlert(a.t,a.b);
    }
    if(a.b.includes('6:00 PM')&&hm>=1755&&hm<=1805&&lastTimeAlert!=='brindavan-go'){
      lastTimeAlert='brindavan-go'; showAlert(a.t,a.b);
    }
    if(a.b.includes('5:30 PM')&&hm>=1625&&hm<=1635&&lastTimeAlert!=='ranganathittu-warn'){
      lastTimeAlert='ranganathittu-warn'; showAlert(a.t,a.b);
    }
  });
}

function getCurrentStopIdx(stops){
  const now=new Date();
  const hm=now.getHours()*60+now.getMinutes();
  let last=-1;
  stops.forEach((s,i)=>{
    const [h,m]=s.time.split(':').map(Number);
    if(h*60+m<=hm)last=i;
  });
  return last;
}

function getProgress(stops){
  const cur=getCurrentStopIdx(stops);
  if(cur<0)return 0;
  return Math.round(((cur+1)/stops.length)*100);
}

      <div class="ov-day-hdr">
        <div class="ov-num" style="background:${d.col}">0${d.n}</div>
        <div><div class="ov-title">${d.name}</div><div class="ov-sub">${d.date} · ${d.km}</div></div>
      </div>
      <div class="ov-row"><span class="bl">Stops</span><span>${d.stops.length} places</span></div>
      <div class="ov-row"><span class="bl">Tolls</span><span>${d.budget.toll}</span></div>
      <div class="ov-row"><span class="bl">Budget</span><span>${d.budget.spend}</span></div>
      <div class="ov-row"><span class="bl">Your stay</span><span>${d.hotel.you}</span></div>
      <div class="ov-row"><span class="bl">FIL + Driver</span><span>${d.hotel.fil}</span></div>
    </div>`;
  });
  h+=`<div class="ov-card" style="border-color:rgba(124,58,237,0.4)">
    <div style="font-size:13px;font-weight:800;color:#a78bfa;margin-bottom:10px">All Bookings Confirmed</div>`;
  BOOKINGS.forEach(b=>{
    h+=`<div class="ov-row"><span class="bl">${b.name}</span><span>${b.paid}</span></div>`;
  });
  h+=`<div class="ov-row"><span class="bl">Grand Total</span><span style="color:#4ade80">~Rs.44,762</span></div>
  </div></div>`;
  document.getElementById('main').innerHTML=h;
}

function renderMessages(){
  let h='<div style="padding:12px">';
  h+=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
    <div style="font-size:13px;font-weight:800">Dashboard Messages</div>
    <button onclick="clearMsgs()" style="font-size:11px;color:var(--tx3);background:none;border:none;cursor:pointer;font-family:Nunito,sans-serif">Clear all</button>
  </div>`;
  if(!messages.length){
    h+=`<div class="msg-empty">No messages yet. GPS location alerts and time-based alerts will appear here.</div>`;
  } else {
    messages.forEach(m=>{
      h+=`<div class="msg-item" style="border-left-color:${m.color};margin-bottom:6px">
        <div class="msg-time">${m.time} · ${m.date}</div>
        <div class="msg-text">${m.text}</div>
      </div>`;
    });
  }
  h+='</div>';
  document.getElementById('main').innerHTML=h;
}

function renderSettings(){
  let h='<div class="settings" style="display:block">';
  h+=`<div class="set-card">
    <div class="set-title">App Settings</div>
    <div class="set-row">
      <div><div class="set-lbl">GPS Location Alerts</div><div class="set-sub">Alert when near each stop</div></div>
      <label class="toggle"><input type="checkbox" ${settings.gps?'checked':''} onchange="toggleSetting('gps',this.checked)"><span class="slider"></span></label>
    </div>
    <div class="set-row">
      <div><div class="set-lbl">Time-Based Alerts</div><div class="set-sub">Alert at scheduled stop times</div></div>
      <label class="toggle"><input type="checkbox" ${settings.timeAlert?'checked':''} onchange="toggleSetting('timeAlert',this.checked)"><span class="slider"></span></label>
    </div>
    <div class="set-row">
      <div><div class="set-lbl">Push Notifications</div><div class="set-sub">Notify even when screen off</div></div>
      <button onclick="requestNotif()" style="font-size:12px;padding:5px 12px;border-radius:8px;background:var(--bg3);color:var(--tx);border:none;cursor:pointer;font-family:Nunito,sans-serif">${Notification.permission==='granted'?'Enabled ✓':'Enable'}</button>
    </div>
  </div>`;

  h+=`<div class="set-card">
    <div class="set-title">Install as App</div>
    <div style="font-size:12px;color:var(--tx2);margin-bottom:10px;line-height:1.5">
      Install this trip guide on your home screen. Works offline — no internet needed during the trip!
    </div>
    <button onclick="doInstall()" style="width:100%;padding:10px;background:#7c3aed;color:#fff;border:none;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;font-family:Nunito,sans-serif">
      Install on Home Screen
    </button>
    <div style="font-size:11px;color:var(--tx3);margin-top:8px;line-height:1.5">
      iPhone: Tap Share → Add to Home Screen<br>Android: Tap the Install button above or browser menu → Add to Home Screen
    </div>
  </div>`;

  h+=`<div class="set-card">
    <div class="set-title">Booking IDs</div>`;
  BOOKINGS.forEach(b=>{
    h+=`<div class="book-row"><div class="bl">${b.name.substring(0,25)}</div><div class="bv">${b.id}</div></div>`;
  });
  h+='</div>';

  h+=`<div class="set-card">
    <div class="set-title">Emergency Contacts</div>
    <div class="book-row"><div class="bl">Serenity Greens Coorg</div><div class="bv">9945619609</div></div>
    <div class="book-row"><div class="bl">Booking ID (Coorg)</div><div class="bv">NH27132471826410</div></div>
    <div class="book-row"><div class="bl">Trip dates</div><div class="bv">Mar 19-23, 2026</div></div>
    <div class="book-row"><div class="bl">Total km</div><div class="bv">969 km</div></div>
  </div></div>`;

  document.getElementById('main').innerHTML=h;
}

function toggleSetting(key,val){
  settings[key]=val;
  localStorage.setItem('tripSettings',JSON.stringify(settings));
  if(key==='gps'){val?startGPS():stopGPS();}
}

function stopGPS(){if(watchId){navigator.geolocation.clearWatch(watchId);watchId=null;gpsActive=false;}}
function clearMsgs(){messages=[];localStorage.setItem('tripMsgs','[]');renderMessages();}

function selectDay(i){activeDay=i;renderTabs();if(activeTab===0)renderToday();}

function showTab(i){
  activeTab=i;
  ['nav0','nav1','nav2','nav3'].forEach((id,j)=>{
    document.getElementById(id).className='nav-btn'+(j===i?' active':'');
  });
  if(i===0)renderToday();
  else if(i===1)renderOverview();
  else if(i===2)renderMessages();
  else if(i===3)renderSettings();
}

function doInstall(){
  if(installPrompt){
    installPrompt.prompt();
    installPrompt.userChoice.then(r=>{
      if(r.outcome==='accepted'){saveMsg('App installed successfully on home screen!','#4ade80');}
      installPrompt=null;
    });
  } else {
    saveMsg('To install: tap browser menu (3 dots) → Add to Home Screen','#60a5fa');
    alert('To install:\nAndroid Chrome: Tap ⋮ menu → "Add to Home Screen"\niPhone Safari: Tap Share → "Add to Home Screen"');
  }
}

function updateClock(){
  const n=new Date();
  const h=String(n.getHours()).padStart(2,'0');
  const m=String(n.getMinutes()).padStart(2,'0');
  const s=String(n.getSeconds()).padStart(2,'0');
  document.getElementById('clock').textContent=`${h}:${m}:${s}`;
}

function autoDay(){
  const n=new Date();
  if(n.getFullYear()===2026&&n.getMonth()===2){
    const d=n.getDate();
    if(d>=19&&d<=23)activeDay=d-19;
  }
}

if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js').then(r=>{
    console.log('SW registered');
  }).catch(e=>console.log('SW failed',e));
}

autoDay();
renderTabs();
renderToday();
updateClock();
setInterval(updateClock,1000);
setInterval(()=>{useTimeBasedAlerts();if(activeTab===0)renderToday();},30000);
if(settings.gps)startGPS();
</script>
</body>
</html>
